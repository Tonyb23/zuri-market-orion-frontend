apiVersion: apps/v1
kind: Deployment
metadata:
  name: zurimarket-frontend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1 # at most 1 pod can be down during update 
      maxSurge: 1 # at most 1 extra pod can exist during update
  selector:
    matchLabels:
      app: zurimarket-frontend
  template:
    metadata:
      labels:
        app: zurimarket-frontend
    spec:
      containers:
      - name: zurimarket-frontend
        image: tonyb23/zuriapp-frontend:latest
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: zurimarket-frontend-svc
spec:
  selector:
    app: zurimarket-frontend
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30080
  type: NodePort